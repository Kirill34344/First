<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Статьи</title>
</head>
<body>

<h1>Список статей</h1>

{% if articles_list %}
    <ul>
        {% for article in articles_list %}
            <li>
                <h2>{{ article.title }}</h2>
                <p>{{ article.content|truncatewords:30 }}</p>
                <small>Создано: {{ article.created_at }}</small>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>Статей пока нет.</p>
{% endif %}

</body>
</html>
